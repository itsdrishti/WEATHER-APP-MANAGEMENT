<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Weather Forecast Dashboard</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/darkmode.css">
    <link rel="stylesheet" href="./css/animations.css">
    <link rel="stylesheet" href="./css/responsive.css">
</head>
<body class="weather-bg-default">
    <div class="app-container glass-container">
        
        <!-- Navbar Placeholder -->
        <header id="navbar-container"></header>

        <main>
            <!-- Loading Spinner -->
            <div id="loading-spinner" class="spinner-container hidden">
                <div class="spinner"></div>
                <p>Fetching weather data...</p>
            </div>

            <!-- Error Message -->
            <div id="error-message" class="error-container hidden">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="error-text">City not found. Please try again.</span>
            </div>

            <div class="dashboard-content hidden" id="dashboard-content">
                <!-- Weather Card Placeholder -->
                <section id="weather-card-container" class="section-current-weather"></section>

                <div class="dashboard-right">
                    <!-- Chart Section -->
                    <section class="section-chart glass-panel">
                        <h3>Temperature Trend</h3>
                        <div class="chart-container">
                            <canvas id="forecastChart"></canvas>
                        </div>
                    </section>

                    <!-- Forecast Placeholder -->
                    <section id="forecast-container" class="section-forecast"></section>
                </div>
            </div>
        </main>

        <!-- Footer Placeholder -->
        <footer id="footer-container"></footer>
    </div>

    <!-- Main Application Script -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
